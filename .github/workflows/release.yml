name: Release

on:
  push:
    tags:
      - "v*"  # trigger เมื่อ push tag เช่น v0.1.0, v1.2.3

permissions:
  contents: write  # จำเป็นสำหรับสร้าง GitHub Release

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser ต้องการ full history สำหรับ changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_TAP_TOKEN: ${{ secrets.SCOOP_TAP_TOKEN }}
